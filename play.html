<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Play Game</title>
    <link rel="icon" type="image/png" href="logo.png" />
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        background: #111;
        font-family: Arial, sans-serif;
        color: white;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }

      /* ── Navbar (matches index.html) ── */
      .navbar {
        display: flex;
        align-items: center;
        padding: 10px 8%;
        background: rgba(17, 17, 17, 0.55);
        backdrop-filter: blur(14px);
        -webkit-backdrop-filter: blur(14px);
        box-shadow: 0 1px 0 rgba(255, 255, 255, 0.07);
        position: sticky;
        top: 0;
        z-index: 100;
        flex-shrink: 0;
      }

      .navbar a.logo-link {
        display: flex;
        align-items: center;
        margin-right: 20px;
        flex-shrink: 0;
        opacity: 0.9;
        transition: opacity 0.2s;
      }

      .navbar a.logo-link:hover {
        opacity: 1;
      }

      .navbar img.logo {
        height: 46px;
        display: block;
      }

      .navbar input.search {
        flex: 1;
        padding: 9px 16px;
        border-radius: 8px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        background: rgba(255, 255, 255, 0.08);
        color: white;
        font-size: 15px;
        outline: none;
        transition:
          border 0.2s,
          background 0.2s;
      }

      .navbar input.search::placeholder {
        color: rgba(255, 255, 255, 0.4);
      }

      .navbar input.search:focus {
        border-color: rgba(255, 255, 255, 0.3);
        background: rgba(255, 255, 255, 0.12);
      }

      .search-wrapper {
        flex: 1;
        position: relative;
      }

      .search-wrapper input.search {
        width: 100%;
      }

      .suggestions {
        display: none;
        position: absolute;
        top: calc(100% + 6px);
        left: 0;
        right: 0;
        background: #1e1e1e;
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 10px;
        overflow: hidden;
        box-shadow: 0 8px 30px rgba(0, 0, 0, 0.6);
        z-index: 200;
      }

      .suggestions.visible {
        display: block;
      }

      .suggestion-item {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 9px 14px;
        cursor: pointer;
        transition: background 0.15s;
        text-decoration: none;
        color: white;
      }

      .suggestion-item:hover,
      .suggestion-item.active {
        background: rgba(255, 255, 255, 0.09);
      }

      .suggestion-item img {
        width: 32px;
        height: 32px;
        border-radius: 6px;
        object-fit: cover;
        flex-shrink: 0;
      }

      .suggestion-item span {
        font-size: 14px;
      }
      .suggestion-item .match {
        color: white;
        font-weight: 600;
      }
      .suggestion-item .rest {
        color: rgba(255, 255, 255, 0.5);
      }

      /* ── Page content ── */
      .page {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 28px 8% 40px;
        gap: 16px;
      }

      /* ── Game title + controls row ── */
      .game-header {
        width: 100%;
        max-width: 1000px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }

      #gameTitle {
        font-size: 20px;
        font-weight: 700;
        letter-spacing: 0.3px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .controls {
        display: flex;
        gap: 8px;
        flex-shrink: 0;
      }

      .btn {
        background: rgba(255, 255, 255, 0.08);
        color: white;
        border: 1px solid rgba(255, 255, 255, 0.12);
        padding: 7px 16px;
        cursor: pointer;
        border-radius: 7px;
        font-size: 14px;
        transition:
          background 0.2s,
          border-color 0.2s;
        white-space: nowrap;
      }

      .btn:hover {
        background: rgba(255, 255, 255, 0.16);
        border-color: rgba(255, 255, 255, 0.25);
      }

      .btn.primary {
        background: rgba(99, 179, 237, 0.15);
        border-color: rgba(99, 179, 237, 0.35);
        color: #90cdf4;
      }

      .btn.primary:hover {
        background: rgba(99, 179, 237, 0.25);
        border-color: rgba(99, 179, 237, 0.55);
      }

      /* ── Game container ── */
      .game-container {
        width: 100%;
        max-width: 1000px;
        height: 680px;
        background: #1a1a1a;
        border-radius: 12px;
        overflow: hidden;
        box-shadow: 0 8px 40px rgba(0, 0, 0, 0.6);
        border: 1px solid rgba(255, 255, 255, 0.06);
      }

      iframe {
        width: 100%;
        height: 100%;
        border: none;
        display: block;
      }

      /* fullscreen */
      .game-container:-webkit-full-screen,
      .game-container:fullscreen {
        width: 100vw;
        height: 100vh;
        max-width: none;
        border-radius: 0;
      }

      @media (max-width: 700px) {
        .page {
          padding: 16px 4% 24px;
        }
        .game-container {
          height: 420px;
        }
        #gameTitle {
          font-size: 16px;
        }
      }

      .home-link {
        margin-left: 16px;
        flex-shrink: 0;
        color: rgba(255, 255, 255, 0.6);
        text-decoration: none;
        font-size: 14px;
        white-space: nowrap;
        transition: color 0.2s;
      }

      .home-link:hover {
        color: white;
      }

      footer {
        text-align: center;
        padding: 28px 8%;
        border-top: 1px solid rgba(255, 255, 255, 0.07);
        margin-top: 20px;
      }

      footer h3 {
        font-size: 13px;
        font-weight: 400;
        color: rgba(255, 255, 255, 0.25);
        margin: 0;
      }
    </style>
  </head>
  <body>
    <!-- Navbar -->
    <div class="navbar">
      <a href="index.html" class="logo-link">
        <img src="logo.png" alt="Home" class="logo" />
      </a>
      <div class="search-wrapper">
        <input
          type="text"
          class="search"
          placeholder="Search games..."
          id="searchInput"
          autocomplete="off"
        />
        <div class="suggestions" id="suggestions"></div>
      </div>
      <a href="index.html" class="home-link">🏠 Home</a>
    </div>

    <!-- Page -->
    <div class="page">
      <div class="game-header">
        <div id="gameTitle">Loading...</div>
        <div class="controls">
          <button class="btn" id="reloadBtn">↺ Reload</button>
          <button class="btn primary" id="fullscreenBtn">⛶ Fullscreen</button>
        </div>
      </div>

      <div class="game-container" id="container">
        <iframe id="gameFrame" allowfullscreen></iframe>
      </div>
    </div>

    <footer>
      <h3>🐶 and Skylarr's dog Bueno</h3>
    </footer>

    <script src="games.js"></script>
    <script>
      // Load game
      const gameName = window.location.search.substring(1).trim().toLowerCase();
      const game = games.find((g) => g.id === gameName);
      const frame = document.getElementById("gameFrame");

      if (game) {
        document.getElementById("gameTitle").textContent = game.title;
        document.title = game.title + " — Unblocked Games";
        frame.src = game.src;
      } else {
        document.getElementById("gameTitle").textContent = "Game not found";
      }

      // Reload
      document.getElementById("reloadBtn").addEventListener("click", () => {
        frame.src = frame.src;
      });

      // Fullscreen
      const container = document.getElementById("container");
      const fsBtn = document.getElementById("fullscreenBtn");

      fsBtn.addEventListener("click", () => {
        if (!document.fullscreenElement && !document.webkitFullscreenElement) {
          if (container.requestFullscreen) container.requestFullscreen();
          else if (container.webkitRequestFullscreen)
            container.webkitRequestFullscreen();
        } else {
          if (document.exitFullscreen) document.exitFullscreen();
          else if (document.webkitExitFullscreen)
            document.webkitExitFullscreen();
        }
      });

      function updateFsBtn() {
        const inFs =
          document.fullscreenElement === container ||
          document.webkitFullscreenElement === container;
        fsBtn.textContent = inFs ? "✕ Exit Fullscreen" : "⛶ Fullscreen";
      }

      document.addEventListener("fullscreenchange", updateFsBtn);
      document.addEventListener("webkitfullscreenchange", updateFsBtn);

      // Search autocomplete
      const searchInput = document.getElementById("searchInput");
      const suggestionsBox = document.getElementById("suggestions");

      const thumbs = {
        "a-small-world-cup":
          "https://play-lh.googleusercontent.com/R47kNu-wEYMVnoo7rFOXiAHoBvW26KHps65Oi0S6zMF722x0LYqHJUiXRvB_xhsj0CM",
        "subway-surfers":
          "https://img.poki-cdn.com/cdn-cgi/image/q=78,scq=50,width=1200,height=1200,fit=cover,f=png/9e89c8fe71f2e1179437b6b6d7e3a5a1/subway-surfers.png",
        "cookie-clicker":
          "https://super142.wordpress.com/wp-content/uploads/2022/07/cookie-clicker.jpg",
        murder:
          "https://play-lh.googleusercontent.com/BT7zrf4JNZj4pRV5YIRT4D0DydkuLEzVvnOwKmmOxuc1sbIUJyZbeaFOhjuLK4CXWFg",
        slope:
          "https://play-lh.googleusercontent.com/FFrKIqKVpB9HMpaaF0HUc5Sza5W2sM8GFZGfkddU39xPcKCa4BYXQghoWVGlQGpaAA=w526-h296-rw",
        swat: "https://imgs.crazygames.com/time-shooter-2_1x1/20241113040556/time-shooter-2_1x1-cover?format=auto&quality=100&metadata=none&width=1200",
        lol: "https://img.utdstc.com/icon/983/22a/98322a3b2be892eed31589906ffd949b68bcccc9a21ba562987965b5ec6bc6de:200",
        "snow-rider":
          "https://say.games/_next/image?url=https%3A%2F%2Fweb-saystore-backend.sgdn.io%2Fsnwrdrw%2Ficon___akGln0EtUjbj&w=3840&q=75",
        shotz: "https://mc0825.github.io/img/class-394.png",
        "goalkeeper-challenge": "https://mc0825.github.io/img/class-1049.png",
        "stair-race": "https://mc0825.github.io/img/class-619.png",
        "among-us": "https://mc0825.github.io/img/class-468.png",
      };

      let activeIndex = -1;

      function escapeHtml(s) {
        return s
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;");
      }

      function showSuggestions(filter) {
        suggestionsBox.innerHTML = "";
        activeIndex = -1;
        if (!filter) {
          suggestionsBox.classList.remove("visible");
          return;
        }
        const matches = games
          .filter((g) => g.title.toLowerCase().includes(filter))
          .slice(0, 6);
        if (!matches.length) {
          suggestionsBox.classList.remove("visible");
          return;
        }
        matches.forEach((game) => {
          const a = document.createElement("a");
          a.className = "suggestion-item";
          a.href = "play.html?" + game.id;
          const img = document.createElement("img");
          img.src = thumbs[game.id] || "";
          img.alt = game.title;
          const title = game.title;
          const idx = title.toLowerCase().indexOf(filter);
          const span = document.createElement("span");
          if (idx !== -1) {
            span.innerHTML =
              escapeHtml(title.slice(0, idx)) +
              '<span class="match">' +
              escapeHtml(title.slice(idx, idx + filter.length)) +
              "</span>" +
              '<span class="rest">' +
              escapeHtml(title.slice(idx + filter.length)) +
              "</span>";
          } else {
            span.textContent = title;
          }
          a.appendChild(img);
          a.appendChild(span);
          suggestionsBox.appendChild(a);
        });
        suggestionsBox.classList.add("visible");
      }

      function setActive(idx) {
        const items = suggestionsBox.querySelectorAll(".suggestion-item");
        items.forEach((el) => el.classList.remove("active"));
        if (idx >= 0 && idx < items.length) {
          items[idx].classList.add("active");
          activeIndex = idx;
        }
      }

      searchInput.addEventListener("input", () =>
        showSuggestions(searchInput.value.toLowerCase().trim()),
      );
      searchInput.addEventListener("keydown", (e) => {
        const items = suggestionsBox.querySelectorAll(".suggestion-item");
        if (e.key === "ArrowDown") {
          e.preventDefault();
          setActive(Math.min(activeIndex + 1, items.length - 1));
        } else if (e.key === "ArrowUp") {
          e.preventDefault();
          setActive(Math.max(activeIndex - 1, 0));
        } else if (
          e.key === "Enter" &&
          activeIndex >= 0 &&
          items[activeIndex]
        ) {
          window.location.href = items[activeIndex].href;
        } else if (e.key === "Escape") {
          suggestionsBox.classList.remove("visible");
        }
      });
      document.addEventListener("click", (e) => {
        if (!e.target.closest(".search-wrapper"))
          suggestionsBox.classList.remove("visible");
      });
      searchInput.addEventListener("focus", () => {
        const f = searchInput.value.toLowerCase().trim();
        if (f) showSuggestions(f);
      });
    </script>
  </body>
</html>
