<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Play Game</title>
    <link rel="icon" type="image/png" href="logo.png" />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        background: #0e0e0e;
        font-family: "Segoe UI", system-ui, sans-serif;
        color: white;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }

      /* ── Navbar ── */
      .navbar {
        display: flex;
        align-items: center;
        padding: 0 24px 0 16px;
        background: rgba(14, 14, 14, 0.75);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        box-shadow: 0 1px 0 rgba(255, 255, 255, 0.06);
        position: sticky;
        top: 0;
        z-index: 200;
        height: 70px;
        flex-shrink: 0;
      }

      .navbar a.logo-link {
        display: flex;
        align-items: center;
        margin-right: 16px;
        flex-shrink: 0;
        opacity: 0.9;
        transition: opacity 0.2s;
      }
      .navbar a.logo-link:hover {
        opacity: 1;
      }
      .navbar img.logo {
        height: 46px;
        display: block;
      }

      .search-wrapper {
        flex: 1;
        position: relative;
        margin: 0 12px;
      }
      .search-wrapper input.search {
        width: 100%;
        padding: 9px 16px;
        border-radius: 8px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        background: rgba(255, 255, 255, 0.07);
        color: white;
        font-size: 14px;
        outline: none;
        transition:
          border 0.2s,
          background 0.2s;
      }
      .search-wrapper input.search::placeholder {
        color: rgba(255, 255, 255, 0.35);
      }
      .search-wrapper input.search:focus {
        border-color: rgba(255, 255, 255, 0.25);
        background: rgba(255, 255, 255, 0.11);
      }

      .suggestions {
        display: none;
        position: absolute;
        top: calc(100% + 6px);
        left: 0;
        right: 0;
        background: #1a1a1a;
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 10px;
        overflow: hidden;
        box-shadow: 0 10px 32px rgba(0, 0, 0, 0.7);
        z-index: 300;
      }
      .suggestions.visible {
        display: block;
      }
      .suggestion-item {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 9px 14px;
        cursor: pointer;
        transition: background 0.12s;
        text-decoration: none;
        color: white;
      }
      .suggestion-item:hover,
      .suggestion-item.active {
        background: rgba(255, 255, 255, 0.08);
      }
      .suggestion-item img {
        width: 30px;
        height: 30px;
        border-radius: 6px;
        object-fit: cover;
        flex-shrink: 0;
      }
      .suggestion-item span {
        font-size: 13px;
      }
      .suggestion-item .match {
        color: white;
        font-weight: 600;
      }
      .suggestion-item .rest {
        color: rgba(255, 255, 255, 0.45);
      }

      .home-link {
        margin-left: 12px;
        flex-shrink: 0;
        color: white;
        text-decoration: none;
        font-size: 13px;
        white-space: nowrap;
        background: rgba(255, 255, 255, 0.1);
        border: 1px solid rgba(255, 255, 255, 0.18);
        padding: 7px 14px;
        border-radius: 7px;
        transition:
          background 0.2s,
          border-color 0.2s;
        font-weight: 500;
      }
      .home-link:hover {
        background: rgba(255, 255, 255, 0.18);
        border-color: rgba(255, 255, 255, 0.3);
      }

      /* ── Page ── */
      .page {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 24px 5% 0;
        gap: 14px;
      }

      /* ── Game header ── */
      .game-header {
        width: 100%;
        max-width: 1000px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }

      #gameTitle {
        font-size: 20px;
        font-weight: 700;
        letter-spacing: 0.3px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .controls {
        display: flex;
        gap: 8px;
        flex-shrink: 0;
      }

      .btn {
        background: rgba(255, 255, 255, 0.08);
        color: white;
        border: 1px solid rgba(255, 255, 255, 0.12);
        padding: 7px 16px;
        cursor: pointer;
        border-radius: 7px;
        font-size: 13px;
        transition:
          background 0.2s,
          border-color 0.2s;
        white-space: nowrap;
      }
      .btn:hover {
        background: rgba(255, 255, 255, 0.16);
        border-color: rgba(255, 255, 255, 0.25);
      }
      .btn.primary {
        background: rgba(99, 179, 237, 0.15);
        border-color: rgba(99, 179, 237, 0.35);
        color: #90cdf4;
      }
      .btn.primary:hover {
        background: rgba(99, 179, 237, 0.25);
        border-color: rgba(99, 179, 237, 0.55);
      }
      .btn.fav-active {
        background: rgba(255, 100, 100, 0.15);
        border-color: rgba(255, 100, 100, 0.35);
        color: #fc8181;
      }
      .btn.fav-active:hover {
        background: rgba(255, 100, 100, 0.25);
      }

      /* ── Game container ── */
      .game-container {
        width: 100%;
        max-width: 1000px;
        height: 660px;
        background: #1a1a1a;
        border-radius: 12px;
        overflow: hidden;
        box-shadow: 0 8px 40px rgba(0, 0, 0, 0.6);
        border: 1px solid rgba(255, 255, 255, 0.06);
      }

      iframe {
        width: 100%;
        height: 100%;
        border: none;
        display: block;
      }

      .game-container:-webkit-full-screen,
      .game-container:fullscreen {
        width: 100vw;
        height: 100vh;
        max-width: none;
        border-radius: 0;
      }

      /* ── You might also like ── */
      .also-like {
        width: 100%;
        max-width: 1000px;
        margin-top: 8px;
        padding-bottom: 16px;
      }
      .also-like h3 {
        font-size: 15px;
        font-weight: 700;
        margin-bottom: 12px;
        color: rgba(255, 255, 255, 0.85);
        padding-bottom: 10px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.06);
      }
      .also-grid {
        display: grid;
        grid-template-columns: repeat(6, 1fr);
        gap: 10px;
      }

      /* ── Cards (mini) ── */
      .card {
        background: #1e1e1e;
        border-radius: 10px;
        overflow: hidden;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        aspect-ratio: 1/1;
        position: relative;
        transition: transform 0.18s;
        border: 1px solid rgba(255, 255, 255, 0.04);
      }
      .card:hover {
        transform: scale(1.06);
      }
      .card:hover .card-label {
        opacity: 1;
        transform: translateY(0);
      }
      .card a {
        display: block;
        width: 100%;
        height: 100%;
      }
      .card img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
      }

      .card-label {
        position: absolute;
        bottom: 0;
        left: 0;
        right: 0;
        background: linear-gradient(transparent, rgba(0, 0, 0, 0.85));
        color: white;
        font-size: 10px;
        font-weight: 600;
        padding: 16px 5px 5px;
        text-align: center;
        opacity: 0;
        transform: translateY(4px);
        transition:
          opacity 0.18s,
          transform 0.18s;
        pointer-events: none;
        line-height: 1.2;
      }

      /* Shimmer */
      .skeleton {
        background: linear-gradient(
          90deg,
          #1e1e1e 25%,
          #2a2a2a 50%,
          #1e1e1e 75%
        );
        background-size: 200% 100%;
        animation: shimmer 1.4s infinite;
        border-radius: 10px;
        aspect-ratio: 1/1;
        border: 1px solid rgba(255, 255, 255, 0.04);
      }
      @keyframes shimmer {
        0% {
          background-position: 200% 0;
        }
        100% {
          background-position: -200% 0;
        }
      }

      /* Footer */
      footer {
        text-align: center;
        padding: 24px 8%;
        border-top: 1px solid rgba(255, 255, 255, 0.06);
        margin-top: 16px;
      }
      footer h3 {
        font-size: 12px;
        font-weight: 400;
        color: rgba(255, 255, 255, 0.2);
      }

      @media (max-width: 700px) {
        .page {
          padding: 16px 4% 0;
        }
        .game-container {
          height: 380px;
        }
        #gameTitle {
          font-size: 16px;
        }
        .also-grid {
          grid-template-columns: repeat(4, 1fr);
        }
      }
      @media (max-width: 480px) {
        .also-grid {
          grid-template-columns: repeat(3, 1fr);
        }
      }
    </style>
  </head>
  <body>
    <div class="navbar">
      <a href="index.html" class="logo-link">
        <img src="logo.png" alt="Home" class="logo" />
      </a>
      <div class="search-wrapper">
        <input
          type="text"
          class="search"
          placeholder="Search games..."
          id="searchInput"
          autocomplete="off"
        />
        <div class="suggestions" id="suggestions"></div>
      </div>
      <a href="index.html" class="home-link">← Home</a>
    </div>

    <div class="page">
      <div class="game-header">
        <div id="gameTitle">Loading...</div>
        <div class="controls">
          <button class="btn" id="favBtn">🤍 Favourite</button>
          <button class="btn" id="reloadBtn">↺ Reload</button>
          <button class="btn primary" id="fullscreenBtn">⛶ Fullscreen</button>
        </div>
      </div>

      <div class="game-container" id="container">
        <iframe id="gameFrame" allowfullscreen></iframe>
      </div>

      <!-- You might also like -->
      <div class="also-like" id="alsoLike" style="display: none">
        <h3>🎮 You might also like</h3>
        <div class="also-grid" id="alsoGrid"></div>
      </div>
    </div>

    <footer><h3>Thanks For Going On Playing My Games(Hi Bueno 🐶)</h3></footer>

    <script src="games.js"></script>
    <script>
      // ── Storage ──
      function getFavs() {
        try {
          return JSON.parse(localStorage.getItem("favs") || "[]");
        } catch {
          return [];
        }
      }
      function setFavs(f) {
        try {
          localStorage.setItem("favs", JSON.stringify(f));
        } catch {}
      }
      function addRecent(id) {
        try {
          let r = JSON.parse(localStorage.getItem("recent") || "[]");
          r = r.filter((x) => x !== id);
          r.unshift(id);
          r = r.slice(0, 8);
          localStorage.setItem("recent", JSON.stringify(r));
        } catch {}
      }

      // ── Load game ──
      const gameName = window.location.search.substring(1).trim().toLowerCase();
      const game = games.find((g) => g.id === gameName);
      const frame = document.getElementById("gameFrame");
      const favBtn = document.getElementById("favBtn");

      if (game) {
        document.getElementById("gameTitle").textContent = game.title;
        document.title = game.title + " — Unblocked Games";
        frame.src = game.src;
        addRecent(game.id);

        // Fav button
        function updateFavBtn() {
          const isFav = getFavs().includes(game.id);
          favBtn.textContent = isFav ? "❤️ Favourited" : "🤍 Favourite";
          favBtn.className = "btn" + (isFav ? " fav-active" : "");
        }
        updateFavBtn();
        favBtn.addEventListener("click", () => {
          let f = getFavs();
          if (f.includes(game.id)) f = f.filter((x) => x !== game.id);
          else f.push(game.id);
          setFavs(f);
          updateFavBtn();
        });

        // You might also like — same tags, excluding current game, up to 6
        const related = games
          .filter(
            (g) =>
              g.id !== game.id &&
              g.tags &&
              game.tags &&
              g.tags.some((t) => game.tags.includes(t)),
          )
          .slice(0, 6);

        if (related.length) {
          const alsoLike = document.getElementById("alsoLike");
          const alsoGrid = document.getElementById("alsoGrid");
          alsoLike.style.display = "block";

          related.forEach((g) => {
            const card = document.createElement("div");
            card.className = "card";

            const skeleton = document.createElement("div");
            skeleton.style.cssText =
              "position:absolute;inset:0;z-index:1;border-radius:10px;background:linear-gradient(90deg,#1e1e1e 25%,#2a2a2a 50%,#1e1e1e 75%);background-size:200% 100%;animation:shimmer 1.4s infinite;";
            card.appendChild(skeleton);

            const a = document.createElement("a");
            a.href = `play.html?${g.id}`;

            const img = document.createElement("img");
            img.alt = g.title;
            img.loading = "lazy";
            img.onload = () => skeleton.remove();
            img.onerror = () => skeleton.remove();
            img.src = g.img;

            const label = document.createElement("div");
            label.className = "card-label";
            label.textContent = g.title;

            a.appendChild(img);
            card.appendChild(a);
            card.appendChild(label);
            alsoGrid.appendChild(card);
          });
        }
      } else {
        document.getElementById("gameTitle").textContent = "Game not found";
        favBtn.style.display = "none";
      }

      // ── Reload ──
      document.getElementById("reloadBtn").addEventListener("click", () => {
        frame.src = frame.src;
      });

      // ── Fullscreen ──
      const container = document.getElementById("container");
      const fsBtn = document.getElementById("fullscreenBtn");

      fsBtn.addEventListener("click", () => {
        if (!document.fullscreenElement && !document.webkitFullscreenElement) {
          if (container.requestFullscreen) container.requestFullscreen();
          else if (container.webkitRequestFullscreen)
            container.webkitRequestFullscreen();
        } else {
          if (document.exitFullscreen) document.exitFullscreen();
          else if (document.webkitExitFullscreen)
            document.webkitExitFullscreen();
        }
      });

      function updateFsBtn() {
        const inFs =
          document.fullscreenElement === container ||
          document.webkitFullscreenElement === container;
        fsBtn.textContent = inFs ? "✕ Exit Fullscreen" : "⛶ Fullscreen";
      }
      document.addEventListener("fullscreenchange", updateFsBtn);
      document.addEventListener("webkitfullscreenchange", updateFsBtn);

      // ── Search autocomplete ──
      const searchInput = document.getElementById("searchInput");
      const suggestionsBox = document.getElementById("suggestions");
      let activeIndex = -1;

      function escapeHtml(s) {
        return s
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;");
      }

      function showSuggestions(filter) {
        suggestionsBox.innerHTML = "";
        activeIndex = -1;
        if (!filter) {
          suggestionsBox.classList.remove("visible");
          return;
        }
        const matches = games
          .filter((g) => g.title.toLowerCase().includes(filter))
          .slice(0, 6);
        if (!matches.length) {
          suggestionsBox.classList.remove("visible");
          return;
        }
        matches.forEach((g) => {
          const a = document.createElement("a");
          a.className = "suggestion-item";
          a.href = "play.html?" + g.id;
          const img = document.createElement("img");
          img.src = g.img;
          img.alt = g.title;
          const title = g.title;
          const idx = title.toLowerCase().indexOf(filter);
          const span = document.createElement("span");
          span.innerHTML =
            idx !== -1
              ? escapeHtml(title.slice(0, idx)) +
                `<span class="match">${escapeHtml(title.slice(idx, idx + filter.length))}</span>` +
                `<span class="rest">${escapeHtml(title.slice(idx + filter.length))}</span>`
              : escapeHtml(title);
          a.appendChild(img);
          a.appendChild(span);
          suggestionsBox.appendChild(a);
        });
        suggestionsBox.classList.add("visible");
      }

      function setActive(idx) {
        const items = suggestionsBox.querySelectorAll(".suggestion-item");
        items.forEach((el) => el.classList.remove("active"));
        if (idx >= 0 && idx < items.length) {
          items[idx].classList.add("active");
          activeIndex = idx;
        }
      }

      searchInput.addEventListener("input", () =>
        showSuggestions(searchInput.value.toLowerCase().trim()),
      );
      searchInput.addEventListener("keydown", (e) => {
        const items = suggestionsBox.querySelectorAll(".suggestion-item");
        if (e.key === "ArrowDown") {
          e.preventDefault();
          setActive(Math.min(activeIndex + 1, items.length - 1));
        } else if (e.key === "ArrowUp") {
          e.preventDefault();
          setActive(Math.max(activeIndex - 1, 0));
        } else if (
          e.key === "Enter" &&
          activeIndex >= 0 &&
          items[activeIndex]
        ) {
          window.location.href = items[activeIndex].href;
        } else if (e.key === "Escape") {
          suggestionsBox.classList.remove("visible");
        }
      });
      document.addEventListener("click", (e) => {
        if (!e.target.closest(".search-wrapper"))
          suggestionsBox.classList.remove("visible");
      });
      searchInput.addEventListener("focus", () => {
        const f = searchInput.value.toLowerCase().trim();
        if (f) showSuggestions(f);
      });
    </script>
  </body>
</html>
