    <style>
      body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #111;
        color: white;
      }

      /* Top nav bar */
      .navbar {
        display: flex;
        align-items: center;
        padding: 10px 8%;
        background: rgba(17, 17, 17, 0.55);
        backdrop-filter: blur(14px);
        -webkit-backdrop-filter: blur(14px);
        box-shadow: 0 1px 0 rgba(255, 255, 255, 0.07);
        position: sticky;
        top: 0;
        z-index: 100;
      }

      .navbar a.logo-link {
        display: flex;
        align-items: center;
        margin-right: 20px;
        flex-shrink: 0;
        opacity: 0.9;
        transition: opacity 0.2s;
      }

      .navbar a.logo-link:hover {
        opacity: 1;
      }

      .navbar img.logo {
        height: 80px;
        display: block;
      }

      .navbar input.search {
        flex: 1;
        padding: 9px 16px;
        border-radius: 8px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        background: rgba(255, 255, 255, 0.08);
        color: white;
        font-size: 15px;
        outline: none;
        transition:
          border 0.2s,
          background 0.2s;
      }

      .navbar input.search::placeholder {
        color: rgba(255, 255, 255, 0.4);
      }

      .navbar input.search:focus {
        border-color: rgba(255, 255, 255, 0.3);
        background: rgba(255, 255, 255, 0.12);
      }

      .search-wrapper {
        flex: 1;
        position: relative;
      }

      .search-wrapper input.search {
        width: 100%;
      }

      .suggestions {
        display: none;
        position: absolute;
        top: calc(100% + 6px);
        left: 0;
        right: 0;
        background: #1e1e1e;
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 10px;
        overflow: hidden;
        box-shadow: 0 8px 30px rgba(0, 0, 0, 0.6);
        z-index: 200;
      }

      .suggestions.visible {
        display: block;
      }

      .suggestion-item {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 9px 14px;
        cursor: pointer;
        transition: background 0.15s;
        text-decoration: none;
        color: white;
      }

      .suggestion-item:hover,
      .suggestion-item.active {
        background: rgba(255, 255, 255, 0.09);
      }

      .suggestion-item img {
        width: 32px;
        height: 32px;
        border-radius: 6px;
        object-fit: cover;
        flex-shrink: 0;
      }

      .suggestion-item span {
        font-size: 14px;
      }
      .suggestion-item .match {
        color: white;
        font-weight: 600;
      }
      .suggestion-item .rest {
        color: rgba(255, 255, 255, 0.5);
      }

      /* Game cards grid — always 6 per row, fewer on small screens */
      #gameCards {
        display: grid;
        grid-template-columns: repeat(6, 1fr);
        gap: 15px;
        padding: 24px 20%;
      }

      @media (max-width: 700px) {
        #gameCards {
          grid-template-columns: repeat(4, 1fr);
          gap: 10px;
          padding: 16px 10%;
        }
      }

      @media (max-width: 420px) {
        #gameCards {
          grid-template-columns: repeat(3, 1fr);
          gap: 8px;
          padding: 12px 12%;
        }
      }

      .card {
        background: #222;
        border-radius: 10px;
        overflow: hidden;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        aspect-ratio: 1 / 1;
        transition:
          transform 0.2s,
          background 0.2s;
      }

      .card:hover {
        transform: scale(1.05);
        background: #333;
      }

      .card a {
        display: block;
        width: 100%;
        height: 100%;
        text-decoration: none;
        color: white;
        text-align: center;
      }

      .card img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
      }
    </style>
  </head>
  <body>

    <script src="games.js"></script>
    <script>
      const searchInput = document.getElementById("searchInput");
      const gameCards = document.querySelectorAll("#gameCards .card");
      const suggestionsBox = document.getElementById("suggestions");

      // Card image map by game id
      const cardImgs = {};
      gameCards.forEach((card) => {
        const a = card.querySelector("a");
        const img = card.querySelector("img");
        const id = a.href.split("?")[1];
        if (id) cardImgs[id] = img.src;
      });

      let activeIndex = -1;
      let currentSuggestions = [];

      function showSuggestions(filter) {
        suggestionsBox.innerHTML = "";
        activeIndex = -1;

        if (!filter) {
          suggestionsBox.classList.remove("visible");
          return;
        }

        currentSuggestions = games
          .filter((g) => g.title.toLowerCase().includes(filter))
          .slice(0, 6);

        if (!currentSuggestions.length) {
          suggestionsBox.classList.remove("visible");
          return;
        }

        currentSuggestions.forEach((game, i) => {
          const a = document.createElement("a");
          a.className = "suggestion-item";
          a.href = "play.html?" + game.id;

          const img = document.createElement("img");
          img.src = cardImgs[game.id] || "";
          img.alt = game.title;

          // Bold the matching part
          const title = game.title;
          const idx = title.toLowerCase().indexOf(filter);
          const span = document.createElement("span");
          if (idx !== -1) {
            span.innerHTML =
              escapeHtml(title.slice(0, idx)) +
              '<span class="match">' +
              escapeHtml(title.slice(idx, idx + filter.length)) +
              "</span>" +
              '<span class="rest">' +
              escapeHtml(title.slice(idx + filter.length)) +
              "</span>";
          } else {
            span.textContent = title;
          }

          a.appendChild(img);
          a.appendChild(span);
          suggestionsBox.appendChild(a);
        });

        suggestionsBox.classList.add("visible");
      }

      function escapeHtml(s) {
        return s
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;");
      }

      function setActive(idx) {
        const items = suggestionsBox.querySelectorAll(".suggestion-item");
        items.forEach((el) => el.classList.remove("active"));
        if (idx >= 0 && idx < items.length) {
          items[idx].classList.add("active");
          activeIndex = idx;
        }
      }

      searchInput.addEventListener("input", () => {
        const filter = searchInput.value.toLowerCase().trim();
        showSuggestions(filter);
        // Also filter cards
        gameCards.forEach((card) => {
          const alt = card.querySelector("img").alt.toLowerCase();
          card.style.display = alt.includes(filter) ? "flex" : "none";
        });
      });

      searchInput.addEventListener("keydown", (e) => {
        const items = suggestionsBox.querySelectorAll(".suggestion-item");
        if (e.key === "ArrowDown") {
          e.preventDefault();
          setActive(Math.min(activeIndex + 1, items.length - 1));
        } else if (e.key === "ArrowUp") {
          e.preventDefault();
          setActive(Math.max(activeIndex - 1, 0));
        } else if (e.key === "Enter") {
          if (activeIndex >= 0 && items[activeIndex]) {
            window.location.href = items[activeIndex].href;
          }
        } else if (e.key === "Escape") {
          suggestionsBox.classList.remove("visible");
        }
      });

      // Hide on outside click
      document.addEventListener("click", (e) => {
        if (!e.target.closest(".search-wrapper")) {
          suggestionsBox.classList.remove("visible");
        }
      });

      searchInput.addEventListener("focus", () => {
        const filter = searchInput.value.toLowerCase().trim();
        if (filter) showSuggestions(filter);
      });
    </script>
